": [], "status": "available", "sold_to_order_id": "", "sold_at": "", "notes": "", "created_at": "2026-04-29T13:02:11+00:00", "updated_at": "2026-04-29T13:02:11+00:00"}, {"id": "PK-001-050", "batch_id": "001", "pack_number": 50, "cards": [], "status": "available", "sold_to_order_id": "", "sold_at": "", "notes": "", "created_at": "2026-04-29T13:02:11+00:00", "updated_at": "2026-04-29T13:02:11+00:00"}]};

  function rarityClass(r) {
    const map = { SR:'rarity-SR', SEC:'rarity-SEC', Leader:'rarity-Leader',
                   P:'rarity-P', Don:'rarity-Don', R:'rarity-R', C:'rarity-C', UC:'rarity-UC' };
    return map[r] || 'rarity-C';
  }

  // Rate chips
  const rc = BATCH.rate_config || {};
  const dist = rc.lucky_distribution || {};
  const rateEl = document.getElementById('rate-chips');
  Object.entries(dist).forEach(([rarity, count]) => {
    const chip = document.createElement('span');
    chip.className = 'chip ' + rarityClass(rarity);
    chip.textContent = rarity + ' ×' + count;
    rateEl.appendChild(chip);
  });

  // Pack grid
  const grid = document.getElementById('pack-grid');
  let activePackId = null;
  BATCH.packs.forEach(pack => {
    const btn = document.createElement('button');
    const sold = pack.status === 'sold';
    btn.id = 'btn-' + pack.id;
    btn.className = 'pack-btn ' + (sold ? 'sold' : 'avail');
    btn.textContent = pack.pack_number;
    btn.title = pack.id + (sold ? ' · ขายแล้ว' : ' · ยังเหลือ');
    btn.addEventListener('click', () => showPack(pack.id));
    grid.appendChild(btn);
  });

  function showPack(packId) {
    const pack = BATCH.packs.find(p => p.id === packId);
    if (!pack) return;

    // highlight active button
    if (activePackId) {
      const prev = document.getElementById('btn-' + activePackId);
      if (prev) prev.classList.remove('active');
    }
    activePackId = packId;
    const btn = document.getElementById('btn-' + packId);
    if (btn) btn.classList.add('active');

    const sold = pack.status === 'sold';
    const cards = pack.cards || [];

    // Group by slot_type
    const common = cards.filter(c => c.slot_type === 'common');
    const rare   = cards.filter(c => c.slot_type === 'rare');
    const lucky  = cards.filter(c => c.slot_type === 'lucky');

    // Card tile with image
    function cardTile(c) {
      const wrapCls = 'card-img-wrap' + (c.slot_type === 'lucky' ? ' lucky' : c.slot_type === 'rare' ? ' rare' : '');
      const img = c.image_url
        ? `<img src="${c.image_url}" alt="${c.name || c.code}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`
        : '';
      const fallback = `<div class="card-img-fallback" style="${c.image_url ? 'display:none' : ''}">${c.code}</div>`;
      return `<div class="card-tile">
        <div class="${wrapCls}">
          ${img}${fallback}
          <div class="card-rarity-badge"><span class="chip ${rarityClass(c.rarity)}">${c.rarity}</span></div>
        </div>
        <div class="card-name" title="${c.name || c.code}">${c.name || c.code}</div>
        <div class="card-code">${c.code}</div>
      </div>`;
    }

    function section(label, slotCls, cardList) {
      if (!cardList.length) return '';
      return `<div>
        <div class="slot-header ${slotCls}">${label} (${cardList.length} ใบ)</div>
        <div class="card-grid">
          ${cardList.map(cardTile).join('')}
        </div>
      </div>`;
    }

    const detail = document.getElementById('pack-detail');
    detail.style.display = 'block';
    detail.innerHTML = `
      <div class="flex items-center justify-between gap-3 flex-wrap" style="margin-bottom:16px">
        <div>
          <div class="pack-id">${pack.id}</div>
          <div class="pack-status ${sold ? 'stat-sold' : 'stat-avail'}">
            ${sold ? '🔴 ขายแล้ว' : '🟢 ยังเหลือ'}
          </div>
        </div>
        <div class="pack-count">${cards.length}/10 ใบ</div>
      </div>
      ${cards.length === 0
        ? '<div style="color:#64748b;font-size:14px;padding:16px 0;text-align:center">ยังไม่ได้กรอกการ์ด</div>'
        : `<div>
            ${section('C / UC — ทั่วไป', 'slot-common', common)}
            ${section('R — Rare', 'slot-rare', rare)}
            ${section('LUCKY 🎯', 'slot-lucky', lucky)}
           </div>`
      }
    `;
    detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // Auto-scroll to pack from URL fragment (#PK-001-045)
  const frag = location.hash.replace('#', '');
  if (frag && frag.startsWith('PK-')) {
    setTimeout(() => showPack(frag), 300);
  }
  </script>
